<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/barlow-condensed@5.0.17/index.min.css" rel="stylesheet">
<link href="https://unpkg.com/@fontsource/orbitron@5.1.1/400.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none;}
html,body{height:100%;overflow:hidden;background:#0a0a0a;}
body{display:flex;flex-direction:column;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;}

/* ── TAP TO START ── */
#overlay{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px;}
#overlay h1{color:#fff;font-size:36px;letter-spacing:12px;font-weight:400;}
#overlay p{color:#444;font-size:11px;letter-spacing:4px;}

/* ── HEADER ── */
#hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 6px;border-bottom:1px solid #1a1a1a;flex-shrink:0;}
.hdr-l{display:flex;align-items:center;gap:8px;}
#logo{font-size:18px;letter-spacing:6px;color:#fff;font-weight:400;}
#mic-dot{width:5px;height:5px;border-radius:50%;background:#333;flex-shrink:0;transition:background .05s;}
#mic-dot.live{background:#f44;}
#hdr-status{font-size:9px;color:#555;letter-spacing:2px;}
#hdr-patch{font-size:9px;color:#888;letter-spacing:2px;text-align:right;}

/* ── BREATH METER ── */
#breath-bar-wrap{padding:5px 14px 3px;flex-shrink:0;}
#breath-track{height:3px;background:#111;border:1px solid #1e1e1e;position:relative;border-radius:1px;}
#breath-fill{position:absolute;top:0;left:0;height:100%;background:#fff;width:0%;transition:width .04s;border-radius:1px;}
#breath-thr{position:absolute;top:-2px;bottom:-2px;width:2px;background:#f44;opacity:0.7;border-radius:1px;}

/* ── WAVEFORM ── */
#wave-wrap{padding:0 14px;flex-shrink:0;}
#wave-cv{display:block;width:100%;}

/* ── MAIN LAYOUT: note keys left + params right ── */
#main{display:flex;flex:1;min-height:0;padding:8px 10px 8px;}

/* ── NOTE KEYS ── */
#keys{display:flex;flex-direction:column;gap:5px;width:62%;padding-right:8px;}
.key-row{display:flex;gap:5px;flex:1;}
.nkey{flex:1;border:1px solid #2a2a2a;border-radius:6px;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;position:relative;overflow:hidden;}
.nkey.active{background:#222;border-color:#888;}
.nkey.held{background:#1e1e1e;border-color:#555;}
.nkey-name{font-size:15px;color:#888;letter-spacing:1px;line-height:1;}
.nkey.active .nkey-name{color:#fff;}
.nkey-oct{font-size:8px;color:#444;letter-spacing:1px;}
.nkey.active .nkey-oct{color:#aaa;}
/* sharp keys slightly different */
.nkey.sharp{background:#0d0d0d;}
.nkey.sharp .nkey-name{color:#666;}
.nkey.sharp.active .nkey-name{color:#fff;}

/* ── PARAM PANEL ── */
#params{display:flex;flex-direction:column;gap:5px;width:38%;}

/* param group */
.pg{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:6px;padding:7px 8px;display:flex;flex-direction:column;gap:5px;}
.pg-title{font-size:7px;color:#444;letter-spacing:2px;text-align:center;}

/* vertical slider */
.vsl-row{display:flex;gap:6px;justify-content:center;}
.vsl{display:flex;flex-direction:column;align-items:center;gap:3px;}
.vsl-lbl{font-size:7px;color:#555;letter-spacing:1px;}
.vsl-track{width:22px;flex:1;background:#111;border:1px solid #1e1e1e;border-radius:2px;position:relative;cursor:pointer;}
.vsl-fill{position:absolute;bottom:0;left:0;right:0;background:#444;border-radius:2px;transition:height .08s;}
.vsl.sel .vsl-fill{background:#fff;}
.vsl-val{font-family:'Orbitron',monospace;font-size:8px;color:#666;letter-spacing:0;}
.vsl.sel .vsl-val{color:#fff;}
.vsl.sel .vsl-lbl{color:#ccc;}

/* small button row */
.btn-row{display:flex;gap:4px;}
.smb{flex:1;height:28px;border:1px solid #2a2a2a;border-radius:4px;background:#111;font-size:8px;color:#666;letter-spacing:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.smb.on{border-color:#888;color:#fff;background:#1e1e1e;}

/* threshold row */
.thr-row{display:flex;align-items:center;gap:6px;}
.thr-lbl{font-size:7px;color:#444;letter-spacing:1px;flex-shrink:0;}
.thr-track{flex:1;height:14px;background:#111;border:1px solid #1e1e1e;border-radius:2px;position:relative;cursor:pointer;}
.thr-pip{position:absolute;top:1px;bottom:1px;width:3px;background:#f44;border-radius:1px;opacity:.7;}
.thr-val{font-size:8px;color:#666;min-width:20px;text-align:right;flex-shrink:0;}

/* octave row */
.oct-row{display:flex;gap:4px;justify-content:center;}
.octb{flex:1;height:26px;border:1px solid #222;border-radius:4px;background:#0d0d0d;font-size:10px;color:#555;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.octb.sel{border-color:#888;color:#fff;background:#1a1a1a;}
</style>
</head>
<body>

<!-- TAP TO START -->
<div id="overlay">
  <h1>DUO</h1>
  <p>TAP TO START</p>
</div>

<!-- HEADER -->
<div id="hdr">
  <div class="hdr-l">
    <span id="logo">DUO</span>
    <span id="mic-dot"></span>
    <span id="hdr-status">READY</span>
  </div>
  <span id="hdr-patch">WIND</span>
</div>

<!-- BREATH METER -->
<div id="breath-bar-wrap">
  <div id="breath-track">
    <div id="breath-fill"></div>
    <div id="breath-thr" style="left:30%"></div>
  </div>
</div>

<!-- WAVEFORM -->
<div id="wave-wrap">
  <canvas id="wave-cv" height="44"></canvas>
</div>

<!-- MAIN -->
<div id="main">

  <!-- NOTE KEYS: 2 rows × 4 notes = 8 notes, C major style + octave shift -->
  <div id="keys">
    <div class="key-row" id="row-top"></div>
    <div class="key-row" id="row-bot"></div>
  </div>

  <!-- PARAM PANEL -->
  <div id="params">

    <!-- OP2 modulator level + OP1/OP2 bitcrush -->
    <div class="pg" id="pg-op">
      <div class="pg-title">FM PARAMS</div>
      <div class="vsl-row">
        <div class="vsl sel" id="vsl-mod" data-param="mod">
          <span class="vsl-lbl">MOD</span>
          <div class="vsl-track" id="vsl-mod-track" style="height:70px;">
            <div class="vsl-fill" id="vsl-mod-fill" style="height:50%"></div>
          </div>
          <span class="vsl-val" id="vsl-mod-val">64</span>
        </div>
        <div class="vsl" id="vsl-bc1" data-param="bc1">
          <span class="vsl-lbl">BC1</span>
          <div class="vsl-track" id="vsl-bc1-track" style="height:70px;">
            <div class="vsl-fill" id="vsl-bc1-fill" style="height:80%"></div>
          </div>
          <span class="vsl-val" id="vsl-bc1-val">16</span>
        </div>
        <div class="vsl" id="vsl-bc2" data-param="bc2">
          <span class="vsl-lbl">BC2</span>
          <div class="vsl-track" id="vsl-bc2-track" style="height:70px;">
            <div class="vsl-fill" id="vsl-bc2-fill" style="height:80%"></div>
          </div>
          <span class="vsl-val" id="vsl-bc2-val">16</span>
        </div>
        <div class="vsl" id="vsl-rat" data-param="rat">
          <span class="vsl-lbl">RAT</span>
          <div class="vsl-track" id="vsl-rat-track" style="height:70px;">
            <div class="vsl-fill" id="vsl-rat-fill" style="height:12%"></div>
          </div>
          <span class="vsl-val" id="vsl-rat-val">2.0</span>
        </div>
      </div>
    </div>

    <!-- Threshold -->
    <div class="pg">
      <div class="pg-title">THRESHOLD</div>
      <div class="thr-row">
        <div class="thr-track" id="thr-track">
          <div class="thr-pip" id="thr-pip" style="left:calc(30% - 1px)"></div>
        </div>
        <span class="thr-val" id="thr-val">30</span>
      </div>
    </div>

    <!-- Octave -->
    <div class="pg">
      <div class="pg-title">OCTAVE</div>
      <div class="oct-row" id="oct-row"></div>
    </div>

    <!-- ADSR quick (attack / release) -->
    <div class="pg" id="pg-adsr">
      <div class="pg-title">ENVELOPE</div>
      <div class="vsl-row">
        <div class="vsl" id="vsl-atk" data-param="atk">
          <span class="vsl-lbl">ATK</span>
          <div class="vsl-track" id="vsl-atk-track" style="height:52px;">
            <div class="vsl-fill" id="vsl-atk-fill" style="height:10%"></div>
          </div>
          <span class="vsl-val" id="vsl-atk-val">10</span>
        </div>
        <div class="vsl" id="vsl-dec" data-param="dec">
          <span class="vsl-lbl">DEC</span>
          <div class="vsl-track" id="vsl-dec-track" style="height:52px;">
            <div class="vsl-fill" id="vsl-dec-fill" style="height:40%"></div>
          </div>
          <span class="vsl-val" id="vsl-dec-val">40</span>
        </div>
        <div class="vsl" id="vsl-sus" data-param="sus">
          <span class="vsl-lbl">SUS</span>
          <div class="vsl-track" id="vsl-sus-track" style="height:52px;">
            <div class="vsl-fill" id="vsl-sus-fill" style="height:70%"></div>
          </div>
          <span class="vsl-val" id="vsl-sus-val">70</span>
        </div>
        <div class="vsl" id="vsl-rel" data-param="rel">
          <span class="vsl-lbl">REL</span>
          <div class="vsl-track" id="vsl-rel-track" style="height:52px;">
            <div class="vsl-fill" id="vsl-rel-fill" style="height:50%"></div>
          </div>
          <span class="vsl-val" id="vsl-rel-val">50</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   DUO WIND — Breath-Controller FM Synth for iPhone
   Blow into mic → gate open; tap note key → change pitch
   ═══════════════════════════════════════════════════════ */

/* ── SYNTH STATE ── */
var ops=[
  {r:10, l:80, br:6, atk:10, dec:40, sus:70, rel:50, label:'CARRIER'},
  {r:20, l:64, br:6, atk:5,  dec:35, sus:70, rel:40, label:'MODULATOR'}
];
var BR_STEPS=[1,2,3,4,6,8,16];
function brVal(op){return BR_STEPS[Math.max(0,Math.min(BR_STEPS.length-1,op.br))];}

var threshold=30;
var rootOct=4;

/* note layout: two rows of 4
   top row: C D E F   bot row: G A B C(+1) */
var NOTE_ROWS=[
  [{n:'C',semi:0,sharp:false},{n:'D',semi:2,sharp:false},{n:'E',semi:4,sharp:false},{n:'F',semi:5,sharp:false}],
  [{n:'G',semi:7,sharp:false},{n:'A',semi:9,sharp:false},{n:'B',semi:11,sharp:false},{n:'C',semi:12,sharp:false}]
];
var activeKeyIdx=null; /* index 0-7 across both rows */
var heldKeyIdx=null;   /* which key the user's finger is on */

function noteFreq(row,col){
  var note=NOTE_ROWS[row][col];
  var semi=note.semi+(rootOct-4)*12;
  return 261.63*Math.pow(2,semi/12);
}
function currentFreq(){
  if(heldKeyIdx===null)return noteFreq(0,0);
  var r=Math.floor(heldKeyIdx/4),c=heldKeyIdx%4;
  return noteFreq(r,c);
}

/* ── BUILD NOTE KEYS ── */
(function(){
  ['row-top','row-bot'].forEach(function(rowId,ri){
    var rowEl=document.getElementById(rowId);
    NOTE_ROWS[ri].forEach(function(note,ci){
      var idx=ri*4+ci;
      var el=document.createElement('div');
      el.className='nkey'+(note.sharp?' sharp':'');
      el.id='nk'+idx;
      el.innerHTML='<span class="nkey-name">'+note.n+'</span><span class="nkey-oct" id="nk-oct'+idx+'"></span>';
      /* touch: hold = sustain this pitch */
      el.addEventListener('touchstart',function(e){e.preventDefault();onKeyDown(idx);},{passive:false});
      el.addEventListener('touchend',function(e){e.preventDefault();onKeyUp(idx);},{passive:false});
      el.addEventListener('touchcancel',function(){onKeyUp(idx);});
      /* mouse for desktop testing */
      el.addEventListener('mousedown',function(e){e.preventDefault();onKeyDown(idx);});
      el.addEventListener('mouseup',function(e){e.preventDefault();onKeyUp(idx);});
      el.addEventListener('mouseleave',function(){if(heldKeyIdx===idx)onKeyUp(idx);});
      rowEl.appendChild(el);
    });
  });
  updateKeyOcts();
})();

function updateKeyOcts(){
  for(var ri=0;ri<2;ri++){
    for(var ci=0;ci<4;ci++){
      var idx=ri*4+ci;
      var semi=NOTE_ROWS[ri][ci].semi+(rootOct-4)*12;
      var oct=4+Math.floor(semi/12);
      document.getElementById('nk-oct'+idx).textContent=oct;
    }
  }
}

function setKeyActive(idx,on){
  if(idx===null||idx<0||idx>7)return;
  var el=document.getElementById('nk'+idx);
  if(el){if(on)el.classList.add('active');else el.classList.remove('active');}
}

function onKeyDown(idx){
  if(heldKeyIdx!==null&&heldKeyIdx!==idx)setKeyActive(heldKeyIdx,false);
  heldKeyIdx=idx;
  setKeyActive(idx,true);
  /* if gate is open, glide to new pitch */
  if(gateOpen&&activeNote&&!activeNote.stopScheduled&&AC){
    var freq=currentFreq();
    var now=AC.currentTime;
    var o1=ops[0],o2=ops[1];
    var f1=freq*(o1.r/10),f2=freq*(o2.r/10);
    try{
      activeNote.s1.frequency.cancelScheduledValues(now);
      activeNote.s1.frequency.setTargetAtTime(f1,now,0.02);
      activeNote.s2.frequency.cancelScheduledValues(now);
      activeNote.s2.frequency.setTargetAtTime(f2,now,0.02);
      /* update modulation depth for new freq */
      activeNote.g21.gain.cancelScheduledValues(now);
      activeNote.g21.gain.setTargetAtTime((o2.l/127)*freq*4,now,0.02);
    }catch(e){}
  }
}

function onKeyUp(idx){
  if(heldKeyIdx===idx){
    setKeyActive(idx,false);
    heldKeyIdx=null;
  }
}

/* ── OCTAVE BUTTONS ── */
(function(){
  var row=document.getElementById('oct-row');
  for(var o=2;o<=6;o++){
    (function(oct){
      var b=document.createElement('div');
      b.className='octb'+(oct===rootOct?' sel':'');
      b.id='oct'+oct;
      b.textContent=oct;
      b.addEventListener('touchend',function(e){e.preventDefault();setOctave(oct);},{passive:false});
      b.addEventListener('click',function(){setOctave(oct);});
      row.appendChild(b);
    })(o);
  }
})();

function setOctave(oct){
  rootOct=oct;
  document.querySelectorAll('.octb').forEach(function(b){b.classList.remove('sel');});
  var el=document.getElementById('oct'+oct);
  if(el)el.classList.add('sel');
  updateKeyOcts();
  /* glide if note held */
  if(gateOpen&&activeNote&&!activeNote.stopScheduled&&AC&&heldKeyIdx!==null){
    var freq=currentFreq();
    var now=AC.currentTime;
    var o1=ops[0],o2=ops[1];
    try{
      activeNote.s1.frequency.cancelScheduledValues(now);
      activeNote.s1.frequency.setTargetAtTime(freq*(o1.r/10),now,0.02);
      activeNote.s2.frequency.cancelScheduledValues(now);
      activeNote.s2.frequency.setTargetAtTime(freq*(o2.r/10),now,0.02);
      activeNote.g21.gain.cancelScheduledValues(now);
      activeNote.g21.gain.setTargetAtTime((o2.l/127)*freq*4,now,0.02);
    }catch(e){}
  }
}

/* ── VERTICAL SLIDERS ── */
/* Each vsl draggable via touch/mouse, 0-100 range */
var VSL_DEFS={
  mod:{get:function(){return ops[1].l;},set:function(v){ops[1].l=Math.round(v);
       /* live update mod gain if note playing */
       if(activeNote&&AC&&!activeNote.stopScheduled){
         var freq=currentFreq();
         activeNote.g21.gain.setTargetAtTime((ops[1].l/127)*freq*4,AC.currentTime,0.02);
       }},
       fill:'vsl-mod-fill',val:'vsl-mod-val',display:function(){return ops[1].l;},pct:function(){return ops[1].l/127*100;}},
  bc1:{get:function(){return ops[0].br;},set:function(v){ops[0].br=Math.round(v/100*(BR_STEPS.length-1));drawWaveform();},
       fill:'vsl-bc1-fill',val:'vsl-bc1-val',display:function(){return brVal(ops[0]);},pct:function(){return ops[0].br/(BR_STEPS.length-1)*100;},
       /* map touch 0-100 range to br index */
       toParam:function(pct){return pct/100*(BR_STEPS.length-1);}},
  bc2:{get:function(){return ops[1].br;},set:function(v){ops[1].br=Math.round(v/100*(BR_STEPS.length-1));drawWaveform();},
       fill:'vsl-bc2-fill',val:'vsl-bc2-val',display:function(){return brVal(ops[1]);},pct:function(){return ops[1].br/(BR_STEPS.length-1)*100;},
       toParam:function(pct){return pct/100*(BR_STEPS.length-1);}},
  rat:{get:function(){return ops[1].r;},set:function(v){ops[1].r=Math.max(10,Math.min(80,Math.round(v/100*70+10)));
       if(activeNote&&AC&&!activeNote.stopScheduled){
         var freq=currentFreq();
         activeNote.s2.frequency.setTargetAtTime(freq*(ops[1].r/10),AC.currentTime,0.02);
       }drawWaveform();},
       fill:'vsl-rat-fill',val:'vsl-rat-val',display:function(){return (ops[1].r/10).toFixed(1);},pct:function(){return (ops[1].r-10)/70*100;}},
  atk:{get:function(){return ops[0].atk;},set:function(v){ops[0].atk=Math.round(v);},
       fill:'vsl-atk-fill',val:'vsl-atk-val',display:function(){return ops[0].atk;},pct:function(){return ops[0].atk;}},
  dec:{get:function(){return ops[0].dec;},set:function(v){ops[0].dec=Math.round(v);},
       fill:'vsl-dec-fill',val:'vsl-dec-val',display:function(){return ops[0].dec;},pct:function(){return ops[0].dec;}},
  sus:{get:function(){return ops[0].sus;},set:function(v){ops[0].sus=Math.round(v);},
       fill:'vsl-sus-fill',val:'vsl-sus-val',display:function(){return ops[0].sus;},pct:function(){return ops[0].sus;}},
  rel:{get:function(){return ops[0].rel;},set:function(v){ops[0].rel=Math.round(v);},
       fill:'vsl-rel-fill',val:'vsl-rel-val',display:function(){return ops[0].rel;},pct:function(){return ops[0].rel;}}
};

function updateVslDisplay(key){
  var d=VSL_DEFS[key];if(!d)return;
  var pct=d.pct();
  document.getElementById(d.fill).style.height=Math.max(0,Math.min(100,pct))+'%';
  document.getElementById(d.val).textContent=d.display();
}
function initVslDisplays(){Object.keys(VSL_DEFS).forEach(updateVslDisplay);}

/* make each vsl-track draggable */
(function(){
  Object.keys(VSL_DEFS).forEach(function(key){
    var trackId='vsl-'+key+'-track';
    var track=document.getElementById(trackId);
    if(!track)return;
    var dragging=false;

    function applyY(clientY){
      var rect=track.getBoundingClientRect();
      var pct=1-(clientY-rect.top)/rect.height;
      pct=Math.max(0,Math.min(1,pct));
      var d=VSL_DEFS[key];
      if(d.toParam){d.set(d.toParam(pct*100));}
      else{d.set(pct*100);}
      updateVslDisplay(key);
    }

    track.addEventListener('touchstart',function(e){e.preventDefault();dragging=true;applyY(e.touches[0].clientY);},{passive:false});
    track.addEventListener('touchmove',function(e){e.preventDefault();if(dragging)applyY(e.touches[0].clientY);},{passive:false});
    track.addEventListener('touchend',function(e){e.preventDefault();dragging=false;},{passive:false});
    track.addEventListener('mousedown',function(e){dragging=true;applyY(e.clientY);});
    window.addEventListener('mousemove',function(e){if(dragging)applyY(e.clientY);});
    window.addEventListener('mouseup',function(){dragging=false;});
  });
})();

/* ── THRESHOLD TRACK ── */
(function(){
  var track=document.getElementById('thr-track');
  var dragging=false;
  function applyX(clientX){
    var rect=track.getBoundingClientRect();
    var pct=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
    threshold=Math.round(pct*100);
    document.getElementById('thr-pip').style.left='calc('+threshold+'% - 1px)';
    document.getElementById('thr-val').textContent=threshold;
    document.getElementById('breath-thr').style.left=threshold+'%';
  }
  track.addEventListener('touchstart',function(e){e.preventDefault();dragging=true;applyX(e.touches[0].clientX);},{passive:false});
  track.addEventListener('touchmove',function(e){e.preventDefault();if(dragging)applyX(e.touches[0].clientX);},{passive:false});
  track.addEventListener('touchend',function(e){e.preventDefault();dragging=false;},{passive:false});
  track.addEventListener('mousedown',function(e){dragging=true;applyX(e.clientX);});
  window.addEventListener('mousemove',function(e){if(dragging&&track.contains(document.elementFromPoint(e.clientX,e.clientY)))applyX(e.clientX);});
  window.addEventListener('mouseup',function(){dragging=false;});
})();

/* ── WAVEFORM ── */
var DPR=Math.min(window.devicePixelRatio||1,2);
var waveImpact=0,waveImpactTimer=null;

function drawWaveform(){
  var cv=document.getElementById('wave-cv');
  var wrap=document.getElementById('wave-wrap');
  var W=wrap.offsetWidth||300,H=44;
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
  var ctx=cv.getContext('2d');
  ctx.scale(DPR,DPR);
  ctx.clearRect(0,0,W,H);

  var mid=H/2,amp=mid-3;
  var baseAmp=0.12+waveImpact*0.88;
  var o1=ops[0],o2=ops[1];
  function qtz(v,bits){if(bits>=16)return v;var s=Math.pow(2,bits)-1;return Math.round(v*s)/s;}

  ctx.strokeStyle='#fff';ctx.lineWidth=1/DPR;ctx.beginPath();
  for(var x=0;x<W;x++){
    var t=x/W;
    var mod=qtz(Math.sin(2*Math.PI*(o2.r/10)*t),brVal(o2));
    var dep=waveImpact*(o2.l/127)*3;
    var sig=qtz(Math.sin(2*Math.PI*(o1.r/10)*t+mod*dep),brVal(o1));
    var y=mid-sig*amp*baseAmp;
    x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();

  /* OP2 line dimmer */
  var modAmp=waveImpact*(o2.l/127);
  if(modAmp>0.01){
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=0.5/DPR;ctx.beginPath();
    for(var x=0;x<W;x++){
      var t=x/W;
      var s2=qtz(Math.sin(2*Math.PI*(o2.r/10)*t),brVal(o2));
      var y=mid-s2*amp*modAmp*0.5;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
}

function triggerWaveImpact(str){
  waveImpact=Math.min(1,str);
  if(waveImpactTimer)clearInterval(waveImpactTimer);
  waveImpactTimer=setInterval(function(){
    waveImpact*=0.94;
    drawWaveform();
    if(waveImpact<0.01){clearInterval(waveImpactTimer);waveImpactTimer=null;waveImpact=0;drawWaveform();}
  },16);
}

/* ── AUDIO ENGINE ── */
var AC=null,masterLimiter=null;
var micStream=null,micSource=null,analyser=null,micActive=false;
var micAnalyseData=null,pitchBuffer=null;
var micPollId=null;
var activeNote=null,gateOpen=false;

var _bitCurveCache={};
function makeBitCurve(bits){
  if(_bitCurveCache[bits])return _bitCurveCache[bits];
  var n=256,curve=new Float32Array(n),steps=Math.pow(2,bits)-1;
  for(var i=0;i<n;i++){var x=(i*2/(n-1))-1;curve[i]=Math.round(x*steps)/steps;}
  _bitCurveCache[bits]=curve;
  return curve;
}

function adsrTime(val,minT,maxT){return minT*Math.pow(maxT/minT,val/100);}

function initAC(){
  if(!AC){
    AC=new(window.AudioContext||window.webkitAudioContext)();
    masterLimiter=AC.createDynamicsCompressor();
    masterLimiter.threshold.value=-6;masterLimiter.knee.value=3;
    masterLimiter.ratio.value=20;masterLimiter.attack.value=0.001;masterLimiter.release.value=0.05;
    masterLimiter.connect(AC.destination);
  }
  if(AC.state==='suspended')return AC.resume();
  return Promise.resolve();
}

function _fmOn(freq,strength,gateMode){
  var now=AC.currentTime;
  var startMod=now+0.001;
  var startCar=now+0.002;
  var o1=ops[0],o2=ops[1];

  var s1=AC.createOscillator(),s2=AC.createOscillator();
  var g21=AC.createGain();
  var env=AC.createGain(),env2=AC.createGain(),vol=AC.createGain();
  var bc1=AC.createWaveShaper(),bc2=AC.createWaveShaper();
  bc1.curve=makeBitCurve(brVal(o1));
  bc2.curve=makeBitCurve(brVal(o2));

  s1.type=s2.type='sine';
  s1.frequency.value=freq*(o1.r/10);
  s2.frequency.value=freq*(o2.r/10);
  g21.gain.value=(o2.l/127)*freq*4;

  var volLevel=80; /* fixed internal level */
  vol.gain.value=(volLevel/100)*strength*0.85;

  /* OP1 envelope */
  var at1=0.002*Math.pow(125,o1.atk/100);
  var dc1=0.01*Math.pow(150,o1.dec/100);
  var su1=Math.max(0.001,Math.pow(o1.sus/100,1.4));
  var rl1=0.01*Math.pow(200,o1.rel/100);
  env.gain.setValueAtTime(0.0001,startCar);
  env.gain.linearRampToValueAtTime(1,startCar+at1);
  env.gain.linearRampToValueAtTime(su1,startCar+at1+dc1);
  /* hold at sustain — no further ramp unless gateMode=false */

  /* OP2 envelope */
  var at2=0.002*Math.pow(125,o2.atk/100);
  var dc2=0.01*Math.pow(150,o2.dec/100);
  var su2=Math.max(0.001,Math.pow(o2.sus/100,1.4));
  var rl2=0.01*Math.pow(200,o2.rel/100);
  env2.gain.setValueAtTime(0.0001,startMod);
  env2.gain.linearRampToValueAtTime(1,startMod+at2);
  env2.gain.linearRampToValueAtTime(su2,startMod+at2+dc2);

  /* routing */
  s2.connect(bc2);bc2.connect(env2);env2.connect(g21);g21.connect(s1.frequency);
  s1.connect(bc1);bc1.connect(env);env.connect(vol);vol.connect(masterLimiter);

  s2.start(startMod);s1.start(startCar);

  var note={s1:s1,s2:s2,env:env,env2:env2,vol:vol,g21:g21,bc1:bc1,bc2:bc2,
            su1:su1,su2:su2,rl1:rl1,rl2:rl2,stopScheduled:false};
  activeNote=note;

  if(!gateMode){
    /* auto-release */
    var sustainDur=Math.max(0.05,at1+dc1);
    var relStart=startCar+sustainDur;
    env.gain.setValueAtTime(su1,relStart);
    env.gain.linearRampToValueAtTime(0.0001,relStart+rl1);
    env2.gain.setValueAtTime(su2,relStart);
    env2.gain.linearRampToValueAtTime(0.0001,relStart+rl2);
    var stopT=relStart+Math.max(rl1,rl2)+0.1;
    note.stopScheduled=true;
    try{s1.stop(stopT);s2.stop(stopT);}catch(e){}
    setTimeout(function(){
      if(activeNote===note)activeNote=null;
      _disconnectNote(note);
    },(stopT-now+0.15)*1000);
  }
  return note;
}

function _disconnectNote(note){
  try{note.s1.disconnect();note.s2.disconnect();note.env.disconnect();
      note.env2.disconnect();note.g21.disconnect();
      note.bc1.disconnect();note.bc2.disconnect();note.vol.disconnect();}catch(e){}
}

function releaseActive(){
  var note=activeNote;
  if(!note||note.stopScheduled)return;
  note.stopScheduled=true;
  var now=AC.currentTime;
  /* snapshot current gain values before cancelling */
  var curE=note.su1,curE2=note.su2;
  try{note.env.gain.cancelAndHoldAtTime(now);}
  catch(e){try{note.env.gain.cancelScheduledValues(now);note.env.gain.setValueAtTime(curE,now);}catch(e2){}}
  try{note.env2.gain.cancelAndHoldAtTime(now);}
  catch(e){try{note.env2.gain.cancelScheduledValues(now);note.env2.gain.setValueAtTime(curE2,now);}catch(e2){}}
  note.env.gain.linearRampToValueAtTime(0.0001,now+note.rl1);
  note.env2.gain.linearRampToValueAtTime(0.0001,now+note.rl2);
  var stopT=now+Math.max(note.rl1,note.rl2)+0.1;
  try{note.s1.stop(stopT);note.s2.stop(stopT);}catch(e){}
  setTimeout(function(){
    if(activeNote===note)activeNote=null;
    _disconnectNote(note);
  },(Math.max(note.rl1,note.rl2)+0.2)*1000);
}

function triggerGate(strength){
  if(!AC||AC.state!=='running')return;
  if(activeNote&&!activeNote.stopScheduled)releaseActive();
  _fmOn(currentFreq(),strength,true);
  triggerWaveImpact(strength);
}

/* ── MIC ENGINE ── */
function startMic(){
  if(micActive)return;
  navigator.mediaDevices.getUserMedia({
    audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false
  }).then(function(stream){
    micStream=stream;
    micSource=AC.createMediaStreamSource(stream);
    var boost=AC.createGain();boost.gain.value=4;
    micSource.connect(boost);
    analyser=AC.createAnalyser();
    analyser.fftSize=2048;analyser.smoothingTimeConstant=0.3;
    boost.connect(analyser);
    try{var sink=AC.createMediaStreamDestination();analyser.connect(sink);}catch(e){}
    micAnalyseData=new Uint8Array(analyser.frequencyBinCount);
    micActive=true;
    document.getElementById('mic-dot').classList.add('live');
    setSt('MIC ON');
    startPoll();
  }).catch(function(e){setSt('NO MIC');console.warn(e);});
}

var prevRms=0;
function startPoll(){
  var POLL=16;
  function poll(){
    if(!micActive||!analyser)return;
    analyser.getByteTimeDomainData(micAnalyseData);
    var sum=0;
    for(var i=0;i<micAnalyseData.length;i++){var s=(micAnalyseData[i]-128)/128;sum+=s*s;}
    var rms=Math.sqrt(sum/micAnalyseData.length);
    var rmsNorm=Math.min(1,rms*5); /* ×5 gain */
    var thrNorm=threshold/100;

    /* breath meter */
    document.getElementById('breath-fill').style.width=Math.round(rmsNorm*100)+'%';

    if(rmsNorm>thrNorm){
      if(!gateOpen){
        gateOpen=true;
        var str=Math.min(1,0.3+(rmsNorm-thrNorm)/(1-thrNorm+0.001)*0.7);
        triggerGate(str);
      }
      /* gate held: waveform stays active */
      if(activeNote&&!activeNote.stopScheduled){
        /* keep waveform animated */
        waveImpact=Math.max(waveImpact,0.3+rmsNorm*0.5);
        drawWaveform();
      }
    } else {
      if(gateOpen){
        gateOpen=false;
        releaseActive();
        /* let waveform decay */
      }
    }

    prevRms=rmsNorm;
    micPollId=setTimeout(poll,POLL);
  }
  poll();
}

/* ── STATUS ── */
function setSt(t){document.getElementById('hdr-status').textContent=t;}

/* ── TAP TO START ── */
(function(){
  var ov=document.getElementById('overlay');
  function unlock(e){
    e.preventDefault();
    initAC().then(function(){
      ov.style.display='none';
      startMic();
      setTimeout(function(){drawWaveform();initVslDisplays();},50);
    });
  }
  ov.addEventListener('touchend',unlock,{passive:false});
  ov.addEventListener('mouseup',unlock);
})();

/* ── INIT ── */
setTimeout(function(){drawWaveform();initVslDisplays();},80);
window.addEventListener('resize',function(){drawWaveform();});
</script>
