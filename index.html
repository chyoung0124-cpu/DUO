<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/barlow-condensed@5.0.17/index.min.css" rel="stylesheet">
<link href="https://unpkg.com/@fontsource/orbitron@5.1.1/400.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{height:100%;overflow:hidden;background:#0a0a0a;}
body{display:flex;flex-direction:column;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;}

/* ── OVERLAY ── */
#overlay{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:14px;cursor:pointer;}
#overlay h1{color:#fff;font-size:34px;letter-spacing:10px;font-weight:400;}
#overlay p{color:#444;font-size:10px;letter-spacing:4px;}

/* ── PAGES ── */
#pg-main{display:flex;flex-direction:column;flex:1;min-height:0;}
#pg-env{display:none;flex-direction:column;flex:1;min-height:0;background:#0a0a0a;}

/* ── HEADER ── */
#hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px 5px;border-bottom:1px solid #1a1a1a;flex-shrink:0;}
.hdr-l{display:flex;align-items:center;gap:7px;}
#logo{font-size:16px;letter-spacing:5px;color:#fff;font-weight:400;}
#mic-dot{width:5px;height:5px;border-radius:50%;background:#333;flex-shrink:0;transition:background .05s;}
#mic-dot.live{background:#f44;}
#hdr-status{font-size:8px;color:#555;letter-spacing:2px;}
#hdr-note{font-size:10px;color:#aaa;letter-spacing:2px;font-family:'Orbitron',monospace;}

/* ── BREATH BAR ── */
#breath-wrap{padding:4px 12px 2px;flex-shrink:0;}
#breath-track{height:4px;background:#111;border:1px solid #1e1e1e;border-radius:2px;position:relative;}
#breath-fill{position:absolute;top:0;left:0;height:100%;background:#fff;width:0%;border-radius:2px;transition:width .03s;}
#breath-thr{position:absolute;top:-3px;bottom:-3px;width:2px;background:#f44;opacity:.6;border-radius:1px;left:30%;}

/* ── WAVEFORM ── */
#wave-wrap{padding:0 12px 4px;flex-shrink:0;}
#wave-cv{display:block;width:100%;}

/* ── MAIN BODY ── */
#body{display:flex;flex:1;min-height:0;padding:6px 10px 8px;gap:8px;}

/* ── NOTE KEYS ── */
#keys{display:flex;flex-direction:column;gap:5px;flex:1;}
.key-row{display:flex;gap:5px;flex:1;}
.nkey{flex:1;border:1px solid #222;border-radius:8px;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;position:relative;overflow:hidden;cursor:pointer;touch-action:none;}
.nkey.act{background:#202020;border-color:#777;}
.nkey-name{font-size:20px;color:#777;letter-spacing:0;line-height:1.1;}
.nkey.act .nkey-name{color:#fff;}
.nkey-sub{font-size:9px;color:#333;letter-spacing:1px;}
.nkey.act .nkey-sub{color:#888;}
.nkey.sharp{background:#0d0d0d;border-color:#1a1a1a;}
.nkey.sharp .nkey-name{color:#555;}
.nkey.sharp.act .nkey-name{color:#fff;}

/* ── RIGHT SIDEBAR ── */
#sidebar{display:flex;flex-direction:column;gap:5px;width:90px;flex-shrink:0;}

/* big tap button */
.big-btn{border:1px solid #2a2a2a;border-radius:8px;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;touch-action:none;}
.big-btn:active,.big-btn.act{background:#1e1e1e;border-color:#666;}
.big-btn-label{font-size:7px;color:#444;letter-spacing:2px;}
.big-btn.act .big-btn-label{color:#aaa;}
.big-btn-val{font-size:11px;color:#666;font-family:'Orbitron',monospace;letter-spacing:0;}
.big-btn.act .big-btn-val{color:#fff;}

/* stepper: − val + */
.stepper{display:flex;align-items:center;justify-content:space-between;width:100%;padding:0 6px;}
.step-arrow{font-size:14px;color:#555;flex-shrink:0;padding:2px 4px;}
.step-val{font-size:11px;color:#fff;font-family:'Orbitron',monospace;text-align:center;flex:1;}

/* octave strip */
#oct-strip{display:flex;gap:3px;flex-shrink:0;}
.octb{flex:1;height:28px;border:1px solid #1e1e1e;border-radius:5px;background:#0d0d0d;font-size:10px;color:#444;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:none;}
.octb.sel{border-color:#777;color:#fff;background:#1a1a1a;}

/* ── ENV PAGE ── */
#env-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 6px;border-bottom:1px solid #1a1a1a;flex-shrink:0;}
#env-hdr-title{font-size:11px;color:#fff;letter-spacing:3px;}
#env-back{font-size:9px;color:#555;letter-spacing:2px;padding:4px 8px;border:1px solid #222;border-radius:4px;cursor:pointer;}
#env-op-sel{display:flex;gap:6px;}
.env-op-tab{font-size:9px;color:#444;letter-spacing:2px;padding:3px 10px;border:1px solid #1e1e1e;border-radius:4px;cursor:pointer;}
.env-op-tab.sel{color:#fff;border-color:#666;}

#env-canvas-wrap{position:relative;flex:1;min-height:0;margin:0 12px;}
#env-cv{position:absolute;top:0;left:0;}

#env-params{flex-shrink:0;padding:8px 12px;display:flex;gap:8px;}
.ep-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.ep-lbl{font-size:8px;color:#444;letter-spacing:2px;}
.ep-lbl.hl{color:#fff;}
.ep-bar-wrap{width:100%;height:6px;background:#111;border:1px solid #1e1e1e;border-radius:2px;position:relative;touch-action:none;}
.ep-bar-fill{height:100%;background:#333;border-radius:2px;}
.ep-col.sel .ep-bar-fill{background:#888;}
.ep-val{font-size:9px;color:#555;font-family:'Orbitron',monospace;}
.ep-col.sel .ep-val{color:#fff;}
/* large +/- buttons for envelope adjustment */
#env-adj{flex-shrink:0;display:flex;gap:8px;padding:0 12px 10px;}
.env-adj-btn{flex:1;height:44px;border:1px solid #222;border-radius:8px;background:#111;font-size:22px;color:#666;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:none;}
.env-adj-btn:active{background:#1e1e1e;color:#fff;border-color:#666;}
#env-hint{padding:3px 12px 6px;font-size:8px;color:#333;letter-spacing:2px;text-align:center;flex-shrink:0;}
</style>
</head>
<body>

<div id="overlay"><h1>DUO</h1><p>TAP TO START</p></div>

<!-- ══ PAGE MAIN ══ -->
<div id="pg-main">

  <!-- header -->
  <div id="hdr">
    <div class="hdr-l">
      <span id="logo">DUO</span>
      <span id="mic-dot"></span>
      <span id="hdr-status">READY</span>
    </div>
    <span id="hdr-note">A4</span>
  </div>

  <!-- breath -->
  <div id="breath-wrap">
    <div id="breath-track">
      <div id="breath-fill"></div>
      <div id="breath-thr" id="breath-thr"></div>
    </div>
  </div>

  <!-- waveform -->
  <div id="wave-wrap"><canvas id="wave-cv" height="40"></canvas></div>

  <!-- body -->
  <div id="body">

    <!-- note keys -->
    <div id="keys">
      <div class="key-row" id="row-top"></div>
      <div class="key-row" id="row-bot"></div>
      <!-- octave strip at bottom -->
      <div id="oct-strip"></div>
    </div>

    <!-- sidebar -->
    <div id="sidebar">

      <!-- MOD DEPTH: tap − / + to adjust -->
      <div class="big-btn" id="btn-mod" style="flex:1;">
        <span class="big-btn-label">MOD</span>
        <div class="stepper">
          <span class="step-arrow" id="mod-dn">−</span>
          <span class="step-val" id="mod-val">64</span>
          <span class="step-arrow" id="mod-up">+</span>
        </div>
      </div>

      <!-- OP1 BITCRUSH -->
      <div class="big-btn" id="btn-bc1" style="flex:1;">
        <span class="big-btn-label">BC1</span>
        <div class="stepper">
          <span class="step-arrow" id="bc1-dn">−</span>
          <span class="step-val" id="bc1-val">16</span>
          <span class="step-arrow" id="bc1-up">+</span>
        </div>
      </div>

      <!-- OP2 BITCRUSH -->
      <div class="big-btn" id="btn-bc2" style="flex:1;">
        <span class="big-btn-label">BC2</span>
        <div class="stepper">
          <span class="step-arrow" id="bc2-dn">−</span>
          <span class="step-val" id="bc2-val">16</span>
          <span class="step-arrow" id="bc2-up">+</span>
        </div>
      </div>

      <!-- THRESHOLD -->
      <div class="big-btn" id="btn-thr" style="flex:1;">
        <span class="big-btn-label">THR</span>
        <div class="stepper">
          <span class="step-arrow" id="thr-dn">−</span>
          <span class="step-val" id="thr-val">30</span>
          <span class="step-arrow" id="thr-up">+</span>
        </div>
      </div>

      <!-- ENVELOPE OPEN -->
      <div class="big-btn" id="btn-env" style="flex:0;padding:10px 0;flex-shrink:0;">
        <span class="big-btn-label">ENV</span>
        <span class="big-btn-val" style="font-size:9px;color:#555;">EDIT ▶</span>
      </div>

    </div><!-- /sidebar -->

  </div><!-- /body -->
</div><!-- /pg-main -->

<!-- ══ PAGE ENV ══ -->
<div id="pg-env">
  <div id="env-hdr">
    <span id="env-hdr-title">ENVELOPE</span>
    <div id="env-op-sel">
      <div class="env-op-tab sel" id="env-tab0">OP1</div>
      <div class="env-op-tab" id="env-tab1">OP2</div>
    </div>
    <span id="env-back">◀ BACK</span>
  </div>

  <!-- ADSR selector bar -->
  <div id="env-params"></div>

  <!-- canvas -->
  <div id="env-canvas-wrap"><canvas id="env-cv"></canvas></div>

  <!-- large − + buttons -->
  <div id="env-adj">
    <div class="env-adj-btn" id="env-minus">−</div>
    <div class="env-adj-btn" id="env-plus">+</div>
  </div>
  <div id="env-hint">TAP ADSR SEGMENT ABOVE · USE − + TO ADJUST</div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   DUO WIND v2
   - Mic RMS → smooth volume (exponential smoothing)
   - Mic pitch → OP2 ratio (autocorrelation, same as v8)
   - Note keys → gate pitch, octave buttons
   - Sidebar steppers: MOD / BC1 / BC2 / THR
   - ENV page: ADSR canvas editor per OP
   ═══════════════════════════════════════════════════════ */

var ops=[
  {r:10, l:80, br:6, atk:10, dec:40, sus:70, rel:50, label:'OP1'},
  {r:20, l:64, br:6, atk:5,  dec:35, sus:70, rel:40, label:'OP2'}
];
var BR_STEPS=[1,2,3,4,6,8,16];
function brVal(op){return BR_STEPS[Math.max(0,Math.min(BR_STEPS.length-1,op.br))];}

var threshold=30;
var rootOct=4;
var smoothedVol=0;   /* exponentially smoothed RMS → volume */
var smoothedRatio=2.0;

/* ── NOTE LAYOUT ── */
var NOTE_ROWS=[
  [{n:'C',semi:0},{n:'D',semi:2},{n:'E',semi:4},{n:'F',semi:5}],
  [{n:'G',semi:7},{n:'A',semi:9},{n:'B',semi:11},{n:'C',semi:12}]
];
var heldKeyIdx=null;

function noteFreq(row,col){
  return 261.63*Math.pow(2,(NOTE_ROWS[row][col].semi+(rootOct-4)*12)/12);
}
function currentFreq(){
  if(heldKeyIdx===null)return 261.63*Math.pow(2,(rootOct-4)*12/12);
  return noteFreq(Math.floor(heldKeyIdx/4),heldKeyIdx%4);
}
function noteLabel(){
  if(heldKeyIdx===null)return 'C'+rootOct;
  var r=Math.floor(heldKeyIdx/4),c=heldKeyIdx%4;
  var note=NOTE_ROWS[r][c];
  var oct=rootOct+Math.floor(note.semi/12);
  return note.n+oct;
}

/* ── BUILD NOTE KEYS ── */
(function(){
  ['row-top','row-bot'].forEach(function(rowId,ri){
    var rowEl=document.getElementById(rowId);
    NOTE_ROWS[ri].forEach(function(note,ci){
      var idx=ri*4+ci;
      var el=document.createElement('div');
      el.className='nkey';el.id='nk'+idx;
      el.style.touchAction='none';
      el.innerHTML='<span class="nkey-name">'+note.n+'</span><span class="nkey-sub" id="nksub'+idx+'"></span>';
      function dn(e){e.preventDefault();onKeyDown(idx);}
      function up(e){e.preventDefault();onKeyUp(idx);}
      el.addEventListener('touchstart',dn,{passive:false});
      el.addEventListener('touchend',up,{passive:false});
      el.addEventListener('touchcancel',up);
      el.addEventListener('mousedown',dn);
      el.addEventListener('mouseup',up);
      el.addEventListener('mouseleave',function(){if(heldKeyIdx===idx)onKeyUp(idx);});
      rowEl.appendChild(el);
    });
  });
  updateKeyLabels();
})();

function updateKeyLabels(){
  for(var ri=0;ri<2;ri++)for(var ci=0;ci<4;ci++){
    var idx=ri*4+ci;
    var semi=NOTE_ROWS[ri][ci].semi;
    var oct=rootOct+Math.floor(semi/12);
    var el=document.getElementById('nksub'+idx);
    if(el)el.textContent=oct;
  }
}

function setKeyVis(idx,on){
  var el=document.getElementById('nk'+idx);
  if(el){if(on)el.classList.add('act');else el.classList.remove('act');}
}

function onKeyDown(idx){
  if(heldKeyIdx!==null&&heldKeyIdx!==idx)setKeyVis(heldKeyIdx,false);
  heldKeyIdx=idx;
  setKeyVis(idx,true);
  document.getElementById('hdr-note').textContent=noteLabel();
  /* glide if gate open */
  if(gateOpen&&activeNote&&!activeNote.stopScheduled&&AC){
    glideToFreq(currentFreq());
  }
}
function onKeyUp(idx){
  if(heldKeyIdx===idx){setKeyVis(idx,false);heldKeyIdx=null;}
}
function glideToFreq(freq){
  var now=AC.currentTime;
  var o1=ops[0],o2=ops[1];
  try{
    activeNote.s1.frequency.cancelScheduledValues(now);
    activeNote.s1.frequency.setTargetAtTime(freq*(o1.r/10),now,0.025);
    activeNote.s2.frequency.cancelScheduledValues(now);
    activeNote.s2.frequency.setTargetAtTime(freq*(o2.r/10),now,0.025);
    activeNote.g21.gain.cancelScheduledValues(now);
    activeNote.g21.gain.setTargetAtTime((o2.l/127)*freq*4,now,0.025);
  }catch(e){}
}

/* ── OCTAVE STRIP ── */
(function(){
  var strip=document.getElementById('oct-strip');
  for(var o=2;o<=6;o++){(function(oct){
    var b=document.createElement('div');
    b.className='octb'+(oct===rootOct?' sel':'');
    b.id='octb'+oct;b.textContent=oct;
    b.style.touchAction='none';
    b.addEventListener('touchend',function(e){e.preventDefault();setOctave(oct);},{passive:false});
    b.addEventListener('click',function(){setOctave(oct);});
    strip.appendChild(b);
  })(o);}
})();
function setOctave(oct){
  rootOct=oct;
  document.querySelectorAll('.octb').forEach(function(b){b.classList.remove('sel');});
  var el=document.getElementById('octb'+oct);if(el)el.classList.add('sel');
  updateKeyLabels();
  document.getElementById('hdr-note').textContent=noteLabel();
  if(gateOpen&&activeNote&&!activeNote.stopScheduled&&AC)glideToFreq(currentFreq());
}

/* ── STEPPER BUTTONS ── */
function makeStepper(upId,dnId,get,set,min,max,step,displayFn,afterFn){
  function adj(dir){
    var v=Math.max(min,Math.min(max,get()+dir*step));
    set(v);
    if(afterFn)afterFn();
  }
  function bindTap(id,dir){
    var el=document.getElementById(id);if(!el)return;
    el.addEventListener('touchend',function(e){e.preventDefault();adj(dir);},{passive:false});
    el.addEventListener('click',function(){adj(dir);});
  }
  bindTap(upId,1);bindTap(dnId,-1);
}

/* MOD depth (ops[1].l 0-127) */
makeStepper('mod-up','mod-dn',
  function(){return ops[1].l;},
  function(v){ops[1].l=Math.round(v);
    if(activeNote&&AC&&!activeNote.stopScheduled){
      activeNote.g21.gain.setTargetAtTime((ops[1].l/127)*currentFreq()*4,AC.currentTime,0.02);}
    document.getElementById('mod-val').textContent=ops[1].l;drawWaveform();},
  0,127,8,null,null);

/* BC1 (ops[0].br) */
makeStepper('bc1-up','bc1-dn',
  function(){return ops[0].br;},
  function(v){ops[0].br=Math.round(v);document.getElementById('bc1-val').textContent=brVal(ops[0]);drawWaveform();},
  0,BR_STEPS.length-1,1,null,null);

/* BC2 (ops[1].br) */
makeStepper('bc2-up','bc2-dn',
  function(){return ops[1].br;},
  function(v){ops[1].br=Math.round(v);document.getElementById('bc2-val').textContent=brVal(ops[1]);drawWaveform();},
  0,BR_STEPS.length-1,1,null,null);

/* THR */
makeStepper('thr-up','thr-dn',
  function(){return threshold;},
  function(v){threshold=Math.round(v);document.getElementById('thr-val').textContent=threshold;
    document.getElementById('breath-thr').style.left=threshold+'%';},
  0,90,5,null,null);

/* init stepper displays */
document.getElementById('mod-val').textContent=ops[1].l;
document.getElementById('bc1-val').textContent=brVal(ops[0]);
document.getElementById('bc2-val').textContent=brVal(ops[1]);
document.getElementById('thr-val').textContent=threshold;
document.getElementById('breath-thr').style.left=threshold+'%';

/* ── ENV PAGE ── */
var envOp=0; /* 0=OP1 1=OP2 */
var envSeg=0; /* 0=atk 1=dec 2=sus 3=rel */
var ENV_KEYS=['atk','dec','sus','rel'];
var ENV_LBLS=['ATTACK','DECAY','SUSTAIN','RELEASE'];
var DPR=Math.min(window.devicePixelRatio||1,2);

document.getElementById('btn-env').addEventListener('touchend',function(e){e.preventDefault();showEnvPage();},{passive:false});
document.getElementById('btn-env').addEventListener('click',showEnvPage);
document.getElementById('env-back').addEventListener('touchend',function(e){e.preventDefault();showMainPage();},{passive:false});
document.getElementById('env-back').addEventListener('click',showMainPage);
document.getElementById('env-tab0').addEventListener('touchend',function(e){e.preventDefault();setEnvOp(0);},{passive:false});
document.getElementById('env-tab0').addEventListener('click',function(){setEnvOp(0);});
document.getElementById('env-tab1').addEventListener('touchend',function(e){e.preventDefault();setEnvOp(1);},{passive:false});
document.getElementById('env-tab1').addEventListener('click',function(){setEnvOp(1);});

/* large minus/plus */
(function(){
  var STEP=5;
  function adj(dir){
    var op=ops[envOp];var k=ENV_KEYS[envSeg];
    op[k]=Math.max(0,Math.min(100,op[k]+dir*STEP));
    buildEnvParams();drawEnvCanvas();
  }
  function bindAdj(id,dir){
    var el=document.getElementById(id);
    /* hold-repeat */
    var holdTimer=null,repeatTimer=null;
    function start(){adj(dir);holdTimer=setTimeout(function(){repeatTimer=setInterval(function(){adj(dir);},80);},350);}
    function stop(){clearTimeout(holdTimer);clearInterval(repeatTimer);holdTimer=repeatTimer=null;}
    el.addEventListener('touchstart',function(e){e.preventDefault();start();},{passive:false});
    el.addEventListener('touchend',function(e){e.preventDefault();stop();},{passive:false});
    el.addEventListener('touchcancel',stop);
    el.addEventListener('mousedown',start);
    window.addEventListener('mouseup',stop);
  }
  bindAdj('env-minus',-1);bindAdj('env-plus',1);
})();

function setEnvOp(i){
  envOp=i;
  document.getElementById('env-tab0').className='env-op-tab'+(i===0?' sel':'');
  document.getElementById('env-tab1').className='env-op-tab'+(i===1?' sel':'');
  buildEnvParams();drawEnvCanvas();
}

function buildEnvParams(){
  var el=document.getElementById('env-params');el.innerHTML='';
  var op=ops[envOp];
  ENV_KEYS.forEach(function(k,i){
    var col=document.createElement('div');
    col.className='ep-col'+(i===envSeg?' sel':'');
    col.style.cursor='pointer';
    var pct=Math.round(op[k]);
    col.innerHTML='<span class="ep-lbl'+(i===envSeg?' hl':'')+'">'+ENV_LBLS[i].substring(0,3)+'</span>'+
      '<div class="ep-bar-wrap"><div class="ep-bar-fill" style="width:'+pct+'%"></div></div>'+
      '<span class="ep-val">'+op[k]+'</span>';
    (function(ii){
      col.addEventListener('touchend',function(e){e.preventDefault();envSeg=ii;buildEnvParams();drawEnvCanvas();},{passive:false});
      col.addEventListener('click',function(){envSeg=ii;buildEnvParams();drawEnvCanvas();});
    })(i);
    el.appendChild(col);
  });
}

function drawEnvCanvas(){
  var wrap=document.getElementById('env-canvas-wrap');
  var cv=document.getElementById('env-cv');
  var W=wrap.offsetWidth,H=wrap.offsetHeight;
  if(!W||!H)return;
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
  var ctx=cv.getContext('2d');ctx.scale(DPR,DPR);ctx.clearRect(0,0,W,H);

  var op=ops[envOp];
  var px=14,pt=14,pb=18,uw=W-px*2,uh=H-pt-pb;
  var eH=Math.round(uh*0.55),eT=pt+Math.round((uh-eH)/2),eB=eT+eH;
  var aT=op.atk+op.dec+50;
  var aZ=uw*0.78,rZ=uw*0.22;
  var aw=op.atk/aT*aZ,dw=Math.max(8,op.dec/aT*aZ);
  var sL=0.12+(op.sus/100)*0.72,sy=eB-Math.round(eH*sL);
  var rw=(op.rel/100)*rZ;
  var x0=px,sX=px+aZ;
  var pts=[[x0,eB],[x0+aw,eT],[x0+aw+dw,sy],[sX,sy],[sX+rw,eB]];

  /* fill */
  ctx.fillStyle='#0f0f0f';ctx.beginPath();
  pts.forEach(function(p,i){i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]);});
  ctx.lineTo(pts[4][0],eB);ctx.lineTo(x0,eB);ctx.closePath();ctx.fill();

  /* segments */
  var segs=[[0,1],[1,2],[2,3],[3,4]];
  segs.forEach(function(s,i){
    var hi=envSeg===i;
    ctx.strokeStyle=hi?'#fff':'#555';ctx.lineWidth=(hi?2:1)/DPR;
    ctx.beginPath();ctx.moveTo(pts[s[0]][0],pts[s[0]][1]);ctx.lineTo(pts[s[1]][0],pts[s[1]][1]);ctx.stroke();
  });

  /* dots */
  pts.forEach(function(p,i){
    ctx.fillStyle=(i>0&&i<5&&envSeg===i-1)||envSeg===i?'#fff':'#555';
    ctx.beginPath();ctx.arc(p[0],p[1],4,0,Math.PI*2);ctx.fill();
  });

  /* labels */
  var lY=H-4;ctx.font='9px Barlow Condensed,Arial,sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';
  var lbls=['A','D','S','R'];
  lbls.forEach(function(l,i){
    ctx.fillStyle=envSeg===i?'#fff':'#444';
    var midX;
    if(i===0)midX=x0+aw/2;
    else if(i===1)midX=x0+aw+dw/2;
    else if(i===2)midX=(x0+aw+dw+sX)/2;
    else midX=sX+rw/2;
    ctx.fillText(l,midX,lY);
  });
}

function showEnvPage(){
  document.getElementById('pg-main').style.display='none';
  document.getElementById('pg-env').style.display='flex';
  buildEnvParams();
  setTimeout(drawEnvCanvas,30);
}
function showMainPage(){
  document.getElementById('pg-env').style.display='none';
  document.getElementById('pg-main').style.display='flex';
  drawWaveform();
}

/* ── WAVEFORM ── */
var waveImpact=0;
var _waveRaf=null;

function drawWaveform(){
  var cv=document.getElementById('wave-cv');
  var wrap=document.getElementById('wave-wrap');
  var W=wrap.offsetWidth||300,H=40;
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
  var ctx=cv.getContext('2d');ctx.scale(DPR,DPR);ctx.clearRect(0,0,W,H);
  var mid=H/2,amp=mid-3;
  var baseAmp=0.1+waveImpact*0.9;
  var o1=ops[0],o2=ops[1];
  function qtz(v,bits){if(bits>=16)return v;var s=Math.pow(2,bits)-1;return Math.round(v*s)/s;}
  ctx.strokeStyle='#fff';ctx.lineWidth=1/DPR;ctx.beginPath();
  for(var x=0;x<W;x++){
    var t=x/W;
    var mod=qtz(Math.sin(2*Math.PI*(o2.r/10)*t),brVal(o2));
    var dep=waveImpact*(o2.l/127)*3;
    var sig=qtz(Math.sin(2*Math.PI*(o1.r/10)*t+mod*dep),brVal(o1));
    var y=mid-sig*amp*baseAmp;
    x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
  /* OP2 ghost */
  if(waveImpact>0.05){
    ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=0.5/DPR;ctx.beginPath();
    for(var x=0;x<W;x++){
      var t=x/W;
      var s2=qtz(Math.sin(2*Math.PI*(o2.r/10)*t),brVal(o2))*waveImpact*(o2.l/127)*0.4;
      x===0?ctx.moveTo(x,mid-s2*amp):ctx.lineTo(x,mid-s2*amp);
    }
    ctx.stroke();
  }
}

function animateWave(){
  if(_waveRaf)return;
  function step(){
    waveImpact*=0.965;
    drawWaveform();
    if(waveImpact>0.01)_waveRaf=requestAnimationFrame(step);
    else{waveImpact=0;drawWaveform();_waveRaf=null;}
  }
  _waveRaf=requestAnimationFrame(step);
}

/* ── AUDIO ENGINE ── */
var AC=null,masterLimiter=null;
var micStream=null,micSource=null,analyser=null;
var micActive=false,micPollId=null;
var micAnalyseData=null,pitchBuffer=null;
var activeNote=null,gateOpen=false;

var _bitCurveCache={};
function makeBitCurve(bits){
  if(_bitCurveCache[bits])return _bitCurveCache[bits];
  var n=256,curve=new Float32Array(n),steps=Math.pow(2,bits)-1;
  for(var i=0;i<n;i++){var x=(i*2/(n-1))-1;curve[i]=Math.round(x*steps)/steps;}
  _bitCurveCache[bits]=curve;return curve;
}

function initAC(){
  if(!AC){
    AC=new(window.AudioContext||window.webkitAudioContext)();
    masterLimiter=AC.createDynamicsCompressor();
    masterLimiter.threshold.value=-6;masterLimiter.knee.value=3;
    masterLimiter.ratio.value=20;masterLimiter.attack.value=0.001;masterLimiter.release.value=0.05;
    masterLimiter.connect(AC.destination);
  }
  if(AC.state==='suspended')return AC.resume();
  return Promise.resolve();
}

/* PITCH DETECTION — autocorrelation (same as v8) */
function detectPitch(buf,sr){
  var n=buf.length,rms=0;
  for(var i=0;i<n;i++)rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/n);
  if(rms<0.005)return -1;
  var ac=new Float32Array(n);
  for(var lag=0;lag<n;lag++){var s=0;for(var j=0;j<n-lag;j++)s+=buf[j]*buf[j+lag];ac[lag]=s;}
  var ac0=ac[0]||1;for(var i=0;i<n;i++)ac[i]/=ac0;
  var i=1;while(i<n&&ac[i]>0)i++;
  var peakVal=-Infinity,peakLag=i;
  while(i<n){if(ac[i]>peakVal){peakVal=ac[i];peakLag=i;}i++;if(i<n&&ac[i-1]>0.5&&ac[i]<ac[i-1])break;}
  if(peakVal<0.2)return -1;
  return sr/peakLag;
}

function _fmOn(freq,strength){
  /* GATE MODE always — no auto-release */
  var now=AC.currentTime;
  var o1=ops[0],o2=ops[1];
  var s1=AC.createOscillator(),s2=AC.createOscillator();
  var g21=AC.createGain();
  var env=AC.createGain(),env2=AC.createGain(),vol=AC.createGain();
  var bc1=AC.createWaveShaper(),bc2=AC.createWaveShaper();
  bc1.curve=makeBitCurve(brVal(o1));bc2.curve=makeBitCurve(brVal(o2));
  s1.type=s2.type='sine';
  s1.frequency.value=freq*(o1.r/10);s2.frequency.value=freq*(o2.r/10);
  g21.gain.value=(o2.l/127)*freq*4;
  vol.gain.value=strength*0.85;

  /* OP1 envelope: A+D, hold at sustain */
  var at1=0.002*Math.pow(125,o1.atk/100);
  var dc1=0.01*Math.pow(150,o1.dec/100);
  var su1=Math.max(0.001,Math.pow(o1.sus/100,1.4));
  var rl1=0.01*Math.pow(200,o1.rel/100);
  env.gain.setValueAtTime(0.0001,now);
  env.gain.linearRampToValueAtTime(1,now+at1);
  env.gain.linearRampToValueAtTime(su1,now+at1+dc1);

  /* OP2 envelope */
  var at2=0.002*Math.pow(125,o2.atk/100);
  var dc2=0.01*Math.pow(150,o2.dec/100);
  var su2=Math.max(0.001,Math.pow(o2.sus/100,1.4));
  var rl2=0.01*Math.pow(200,o2.rel/100);
  env2.gain.setValueAtTime(0.0001,now);
  env2.gain.linearRampToValueAtTime(1,now+at2);
  env2.gain.linearRampToValueAtTime(su2,now+at2+dc2);

  s2.connect(bc2);bc2.connect(env2);env2.connect(g21);g21.connect(s1.frequency);
  s1.connect(bc1);bc1.connect(env);env.connect(vol);vol.connect(masterLimiter);
  s2.start(now);s1.start(now);

  activeNote={s1:s1,s2:s2,env:env,env2:env2,vol:vol,g21:g21,bc1:bc1,bc2:bc2,
              su1:su1,su2:su2,rl1:rl1,rl2:rl2,stopScheduled:false};
}

function _disconnectNote(note){
  try{note.s1.disconnect();note.s2.disconnect();note.env.disconnect();
      note.env2.disconnect();note.g21.disconnect();
      note.bc1.disconnect();note.bc2.disconnect();note.vol.disconnect();}catch(e){}
}

function releaseActive(){
  var note=activeNote;
  if(!note||note.stopScheduled)return;
  note.stopScheduled=true;
  var now=AC.currentTime;
  try{note.env.gain.cancelAndHoldAtTime(now);}catch(e){
    try{note.env.gain.cancelScheduledValues(now);note.env.gain.setValueAtTime(note.su1,now);}catch(e2){}}
  try{note.env2.gain.cancelAndHoldAtTime(now);}catch(e){
    try{note.env2.gain.cancelScheduledValues(now);note.env2.gain.setValueAtTime(note.su2,now);}catch(e2){}}
  note.env.gain.linearRampToValueAtTime(0.0001,now+note.rl1);
  note.env2.gain.linearRampToValueAtTime(0.0001,now+note.rl2);
  var stopT=now+Math.max(note.rl1,note.rl2)+0.1;
  try{note.s1.stop(stopT);note.s2.stop(stopT);}catch(e){}
  setTimeout(function(){
    if(activeNote===note)activeNote=null;
    _disconnectNote(note);
  },(Math.max(note.rl1,note.rl2)+0.2)*1000);
}

/* smooth volume: update vol.gain live during gate */
function setNoteVol(v){
  if(activeNote&&!activeNote.stopScheduled&&AC){
    activeNote.vol.gain.setTargetAtTime(Math.max(0.001,v),AC.currentTime,0.04);
  }
}

/* ── MIC POLL ── */
function startMic(){
  if(micActive)return;
  navigator.mediaDevices.getUserMedia({
    audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false
  }).then(function(stream){
    micStream=stream;
    micSource=AC.createMediaStreamSource(stream);
    var boost=AC.createGain();boost.gain.value=4;
    micSource.connect(boost);
    analyser=AC.createAnalyser();
    analyser.fftSize=2048;
    analyser.smoothingTimeConstant=0;
    boost.connect(analyser);
    try{var sink=AC.createMediaStreamDestination();analyser.connect(sink);}catch(e){}
    micAnalyseData=new Uint8Array(analyser.frequencyBinCount);
    pitchBuffer=new Float32Array(analyser.fftSize);
    micActive=true;
    document.getElementById('mic-dot').classList.add('live');
    setSt('MIC ON');
    startPoll();
  }).catch(function(e){setSt('NO MIC');console.warn(e);});
}

function startPoll(){
  var POLL=16;
  /* exponential smoothing coefficients */
  var VOL_ATTACK=0.15;   /* fast attack (0=instant 1=never) */
  var VOL_RELEASE=0.96;  /* slow release (keeps volume from stuttering) */

  function poll(){
    if(!micActive||!analyser)return;
    analyser.getByteTimeDomainData(micAnalyseData);
    var sum=0;
    for(var i=0;i<micAnalyseData.length;i++){var s=(micAnalyseData[i]-128)/128;sum+=s*s;}
    var rms=Math.sqrt(sum/micAnalyseData.length);
    var rmsNorm=Math.min(1,rms*5);
    var thrNorm=threshold/100;

    /* ── smooth volume ── */
    if(rmsNorm>smoothedVol)smoothedVol=smoothedVol*(1-VOL_ATTACK)+rmsNorm*VOL_ATTACK;
    else smoothedVol=smoothedVol*VOL_RELEASE+rmsNorm*(1-VOL_RELEASE);
    smoothedVol=Math.max(0,Math.min(1,smoothedVol));

    /* breath bar uses raw rmsNorm for visual responsiveness */
    document.getElementById('breath-fill').style.width=Math.round(rmsNorm*100)+'%';

    /* pitch detection */
    var detectedFreq=-1;
    if(rmsNorm>thrNorm&&analyser.getFloatTimeDomainData){
      analyser.getFloatTimeDomainData(pitchBuffer);
      detectedFreq=detectPitch(pitchBuffer,AC.sampleRate);
    }

    /* map mic pitch → OP2 ratio (same logic as v8) */
    if(detectedFreq>80&&detectedFreq<4000&&gateOpen&&activeNote&&!activeNote.stopScheduled){
      var baseFreq=currentFreq();
      var liveRatio=Math.max(0.1,Math.min(16.0,detectedFreq/baseFreq));
      /* exponential ramp to new OP2 freq — smooth glide */
      try{
        activeNote.s2.frequency.exponentialRampToValueAtTime(
          baseFreq*liveRatio, AC.currentTime+0.03);
      }catch(e){}
      smoothedRatio=liveRatio;
      ops[1].r=Math.round(liveRatio*10);
    }

    /* gate logic */
    if(rmsNorm>thrNorm){
      if(!gateOpen){
        /* onset */
        gateOpen=true;
        if(activeNote&&!activeNote.stopScheduled)releaseActive();
        var str=Math.min(0.9,0.2+(rmsNorm-thrNorm)/(1-thrNorm+0.001)*0.7);
        _fmOn(currentFreq(),str);
        waveImpact=str;animateWave();
      } else {
        /* gate held → update volume from smoothed RMS, keep waveImpact alive */
        var volAbove=Math.max(0.15,(smoothedVol-thrNorm)/(1-thrNorm+0.001));
        setNoteVol(volAbove*0.85);
        waveImpact=Math.max(waveImpact,smoothedVol*0.6);
      }
    } else {
      if(gateOpen){
        gateOpen=false;
        releaseActive();
        /* let wave decay naturally via animateWave loop */
      }
    }

    micPollId=setTimeout(poll,POLL);
  }
  poll();
}

function setSt(t){document.getElementById('hdr-status').textContent=t;}

/* ── TAP TO START ── */
(function(){
  var ov=document.getElementById('overlay');
  function unlock(e){
    e.preventDefault();
    initAC().then(function(){
      ov.style.display='none';
      startMic();
      setTimeout(function(){drawWaveform();},60);
    });
  }
  ov.addEventListener('touchend',unlock,{passive:false});
  ov.addEventListener('mouseup',unlock);
})();

/* ── RESIZE ── */
setTimeout(function(){drawWaveform();},80);
window.addEventListener('resize',function(){drawWaveform();if(document.getElementById('pg-env').style.display!=='none')drawEnvCanvas();});
</script>
